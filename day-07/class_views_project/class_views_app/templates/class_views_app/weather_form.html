{% extends "class_views_app/base.html" %}

{% block content %}

<h1>Weather Forecast</h1>

<ul>
    {% for w in weather %}
    
    <li>{{w.date}} - {{w.city}} - {{w.temp_f}}F - {{w.condition}}</li>
    
    {% endfor %}
</ul>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <input type="submit" value="Add Weather Report">

</form>
    
{% endblock %}
